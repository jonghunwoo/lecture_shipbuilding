<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Strategy Analysis - SNU NAOE</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // 아이콘 에러를 막기 위해 SVG로 직접 정의
        const Package = (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
        const Cpu = (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const TrendingDown = (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;
        const Info = (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Calculator = (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const ShieldCheck = (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6 2a1 1 0 0 1 1 1v7z"/><path d="m9 12 2 2 4-4"/></svg>;

        const App = () => {
            const NUM_CATEGORIES = 6;
            const OPTIONS_PER_CAT = 3;
            const TOTAL_MODELS = Math.pow(OPTIONS_PER_CAT, NUM_CATEGORIES); 
            const TOTAL_COMPONENTS = NUM_CATEGORIES * OPTIONS_PER_CAT; 
            const COST_PER_COMP = 150;
            const COST_PER_PC = COST_PER_COMP * NUM_CATEGORIES; 
            const MEAN_DEMAND_PC = 100;
            const STD_DEV_PC = 10;
            const LEAD_TIME = 0.25; 
            const Z_SCORE = 2.33; 

            const calculations = useMemo(() => {
                const theta_pc = MEAN_DEMAND_PC * LEAD_TIME;
                const sigma_lt_pc = STD_DEV_PC * Math.sqrt(LEAD_TIME);
                const ss_per_pc = Z_SCORE * sigma_lt_pc;
                const total_units_fgi = TOTAL_MODELS * (theta_pc + ss_per_pc);
                const total_value_fgi = total_units_fgi * COST_PER_PC;

                const models_per_comp = Math.pow(OPTIONS_PER_CAT, NUM_CATEGORIES - 1);
                const mean_demand_comp = MEAN_DEMAND_PC * models_per_comp;
                const theta_comp = mean_demand_comp * LEAD_TIME;
                const var_lt_pc = Math.pow(sigma_lt_pc, 2);
                const sigma_lt_comp = Math.sqrt(models_per_comp * var_lt_pc);
                
                const ss_per_comp = Z_SCORE * sigma_lt_comp;
                const total_units_ci = TOTAL_COMPONENTS * (theta_comp + ss_per_comp);
                const total_value_ci = total_units_ci * COST_PER_COMP;

                const savings = total_value_fgi - total_value_ci;
                const percent_reduction = (savings / total_value_fgi) * 100;

                return {
                    fgi: { units: total_units_fgi, value: total_value_fgi, ss: ss_per_pc * TOTAL_MODELS, cycle: theta_pc * TOTAL_MODELS },
                    ci: { units: total_units_ci, value: total_value_ci, ss: ss_per_comp * TOTAL_COMPONENTS, cycle: theta_comp * TOTAL_COMPONENTS },
                    savings, percent_reduction, sigma_lt_pc, sigma_lt_comp
                };
            }, []);

            const chartData = [
                { name: 'Finished Goods (FGI)', 'Cycle Stock Value': Math.round(calculations.fgi.cycle * COST_PER_PC), 'Safety Stock Value': Math.round(calculations.fgi.ss * COST_PER_PC) },
                { name: 'Component (ATO)', 'Cycle Stock Value': Math.round(calculations.ci.cycle * COST_PER_COMP), 'Safety Stock Value': Math.round(calculations.ci.ss * COST_PER_COMP) }
            ];

            const StatCard = ({ title, value, subtext, icon: Icon, color }) => (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <div className="flex items-start justify-between">
                        <div>
                            <p className="text-sm font-medium text-slate-500 mb-1">{title}</p>
                            <h3 className="text-2xl font-bold text-slate-900">{value}</h3>
                            {subtext && <p className="text-xs text-slate-400 mt-1">{subtext}</p>}
                        </div>
                        <div className={`p-3 rounded-lg ${color}`}>
                            <Icon className="w-6 h-6 text-white" />
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans">
                    <div className="max-w-6xl mx-auto space-y-8">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900">Inventory Strategy Analysis</h1>
                                <p className="text-slate-500">Comparing FGI vs. Component Inventory (ATO) for 729 PC Models</p>
                            </div>
                            <div className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-lg">
                                <TrendingDown className="w-5 h-5" />
                                <span>{calculations.percent_reduction.toFixed(1)}% Investment Reduction</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <StatCard title="Total PC Models" value={TOTAL_MODELS.toLocaleString()} subtext="3^6 unique configurations" icon={Package} color="bg-slate-700" />
                            <StatCard title="Total Components" value={TOTAL_COMPONENTS.toLocaleString()} subtext="6 categories × 3 options" icon={Cpu} color="bg-blue-500" />
                            <StatCard title="Target Fill Rate" value="99%" subtext="Base Stock Policy" icon={ShieldCheck} color="bg-emerald-500" />
                            <StatCard title="Capital Saved" value={`$${(calculations.savings / 1000000).toFixed(2)}M`} subtext="By switching to Component Strategy" icon={Calculator} color="bg-orange-500" />
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <h2 className="text-lg font-bold text-slate-900 mb-6">Inventory Investment Comparison ($)</h2>
                                <div className="h-80 w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={chartData} layout="vertical" margin={{ left: 40, right: 40 }}>
                                            <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} />
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="name" type="category" width={150} />
                                            <Tooltip formatter={(value) => `$${value.toLocaleString()}`} cursor={{fill: '#f8fafc'}} />
                                            <Legend />
                                            <Bar dataKey="Cycle Stock Value" stackId="a" fill="#3b82f6" />
                                            <Bar dataKey="Safety Stock Value" stackId="a" fill="#ef4444" radius={[0, 4, 4, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="mt-4 p-4 bg-blue-50 rounded-lg text-sm text-blue-800 flex items-start gap-3">
                                    <Info className="w-5 h-5 flex-shrink-0" />
                                    <p>The <strong>Component Strategy</strong> leverages the "Portfolio Effect." Since component demand aggregates demand from 243 different models, the relative uncertainty drops significantly.</p>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 space-y-6">
                                <h2 className="text-lg font-bold text-slate-900">Why it works</h2>
                                <div className="space-y-4">
                                    {[
                                        { id: 1, t: "Reduced Stocking Units", d: "From 729 models down to 18 components." },
                                        { id: 2, t: "Statistical Aggregation", d: `Comp. Std Dev (${calculations.sigma_lt_comp.toFixed(1)}) is much lower than 243 × Indiv. Std Dev.` },
                                        { id: 3, t: "Risk Pooling", d: "High demand in one model offsets low demand in another." }
                                    ].map(item => (
                                        <div key={item.id} className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600">{item.id}</div>
                                            <div>
                                                <p className="font-bold text-sm">{item.t}</p>
                                                <p className="text-xs text-slate-500">{item.d}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-6 border-b border-slate-100">
                                <h2 className="text-lg font-bold text-slate-900">Comparative Analytics</h2>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-slate-500 text-xs uppercase">
                                        <tr>
                                            <th className="px-6 py-4 font-semibold">Metric</th>
                                            <th className="px-6 py-4 font-semibold text-right">FGI Strategy</th>
                                            <th className="px-6 py-4 font-semibold text-right">Component Strategy
