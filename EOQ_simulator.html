<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경제적 주문량(EOQ) 비용 곡선 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --accent-blue: #0066cc;
            --border-color: #d2d2d7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 30px; }
        .dashboard {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .metrics {
            display: flex;
            justify-content: space-around;
            background: #f0f8ff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .metric-box { text-align: center; }
        .metric-title { font-size: 0.9rem; color: #555; margin-bottom: 5px; }
        .metric-value { font-size: 1.8rem; font-weight: 700; color: var(--accent-blue); }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        /* 슬라이더와 입력창 나란히 배치 */
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent-blue);
        }
        input[type="number"] {
            width: 70px;
            padding: 6px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
        }
        .chart-container { position: relative; height: 450px; width: 100%; }
    </style>
</head>
<body>

    <h1>경제적 주문량(EOQ) 최적화 시뮬레이터</h1>

    <div class="dashboard">
        <div class="metrics">
            <div class="metric-box">
                <div class="metric-title">최적 로트 생산량 (EOQ)</div>
                <div class="metric-value" id="val-eoq">0</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">최소 연간 총 비용</div>
                <div class="metric-value" id="val-tc">0</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">연간 생산/주문 횟수</div>
                <div class="metric-value" id="val-orders">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>연간 수요량 (D)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-D" min="100" max="5000" step="10" value="1440">
                    <input type="number" id="input-D" min="100" max="5000" step="10" value="1440">
                </div>
            </div>
            <div class="control-group">
                <label>작업준비 고정 비용 (A)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-A" min="10" max="1000" step="10" value="140">
                    <input type="number" id="input-A" min="10" max="1000" step="10" value="140">
                </div>
            </div>
            <div class="control-group">
                <label>단위당 재고 유지비용 (h)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-h" min="1" max="100" step="1" value="28">
                    <input type="number" id="input-h" min="1" max="100" step="1" value="28">
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="costChart"></canvas>
        </div>
    </div>

    <script>
        let costChart;

        // 차트 초기화 (1회만 실행)
        function initChart() {
            const ctx = document.getElementById('costChart').getContext('2d');
            costChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: '총 비용 (Total Cost)',
                            data: [],
                            borderColor: '#1d1d1f',
                            borderWidth: 3,
                            fill: false,
                            pointRadius: 0, // 선 위의 자잘한 점 제거
                            tension: 0.4
                        },
                        {
                            label: '재고 유지 비용 (Holding Cost)',
                            data: [],
                            borderColor: '#34c759',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        },
                        {
                            label: '작업준비 비용 (Setup Cost)',
                            data: [],
                            borderColor: '#ff3b30',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        },
                        {
                            label: '최적점 (EOQ)',
                            data: [],
                            backgroundColor: '#0066cc',
                            borderColor: '#0066cc',
                            pointRadius: 8,       // 최적점만 크게 표시
                            pointHoverRadius: 10,
                            showLine: false,
                            type: 'scatter'       // 이 데이터셋만 점으로 렌더링
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 400, // 부드러운 애니메이션 전환
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            labels: {
                                usePointStyle: true, // 범례 아이콘을 원형(Dot)으로 변경
                                pointStyle: 'circle'
                            }
                        }
                    },
                    scales: {
                        x: { 
                            type: 'linear', // x축을 단순 텍스트가 아닌 선형 수치 축으로 변경
                            title: { display: true, text: '로트 생산량 (Q)' },
                            min: 0
                        },
                        y: { 
                            title: { display: true, text: '비용 (Cost)' }, 
                            min: 0 
                        }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }

        // 데이터 연산 및 차트 업데이트
        function calculateAndDraw() {
            const D = parseFloat(document.getElementById('input-D').value) || 0;
            const A = parseFloat(document.getElementById('input-A').value) || 0;
            const h = parseFloat(document.getElementById('input-h').value) || 0;

            if(h === 0 || D === 0) return; // 0으로 나누기 방지

            const eoq = Math.sqrt((2 * D * A) / h);
            const minTotalCost = (D / eoq) * A + (eoq / 2) * h;
            const orders = D / eoq;

            document.getElementById('val-eoq').innerText = eoq.toFixed(0) + " 개";
            document.getElementById('val-tc').innerText = minTotalCost.toFixed(0) + " 원";
            document.getElementById('val-orders').innerText = orders.toFixed(1) + " 회";

            const holdingCosts = [];
            const setupCosts = [];
            const totalCosts = [];

            // EOQ 값에 따라 그래프가 그려지는 X축의 최대 범위를 유동적으로 설정
            const maxQ = Math.max(1000, Math.ceil(eoq * 2.5));
            costChart.options.scales.x.max = maxQ;

            for (let q = 10; q <= maxQ; q += 10) {
                // {x, y} 좌표 형태로 데이터 생성
                holdingCosts.push({x: q, y: (q / 2) * h});
                setupCosts.push({x: q, y: (D / q) * A});
                totalCosts.push({x: q, y: ((D / q) * A) + ((q / 2) * h)});
            }

            // 정확한 수학적 최적점 좌표 단 한 개만 배열에 넣음
            const optimalPoint = [{x: eoq, y: minTotalCost}];

            // 차트 데이터 객체 업데이트 (destroy 하지 않음)
            costChart.data.datasets[0].data = totalCosts;
            costChart.data.datasets[1].data = holdingCosts;
            costChart.data.datasets[2].data = setupCosts;
            costChart.data.datasets[3].data = optimalPoint;

            costChart.update();
        }

        // 슬라이더와 숫자 입력창 동기화 유틸리티
        function syncInputs(id) {
            const slider = document.getElementById('slider-' + id);
            const input = document.getElementById('input-' + id);
            
            slider.addEventListener('input', (e) => { 
                input.value = e.target.value; 
                calculateAndDraw(); 
            });
            input.addEventListener('input', (e) => { 
                slider.value = e.target.value; 
                calculateAndDraw(); 
            });
        }

        // 초기화 및 이벤트 리스너 등록
        initChart();
        syncInputs('D');
        syncInputs('A');
        syncInputs('h');
        calculateAndDraw();

    </script>
</body>
</html>
