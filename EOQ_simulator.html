<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경제적 주문량(EOQ) 통합 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --accent-blue: #0066cc;
            --border-color: #d2d2d7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .dashboard {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-box { 
            text-align: center; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .metric-title { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .metric-value { font-size: 1.6rem; font-weight: 700; color: var(--accent-blue); }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
            padding: 20px;
            background: #fff;
            border-top: 1px solid var(--border-color);
        }
        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent-blue);
        }
        input[type="number"] {
            width: 85px;
            padding: 8px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: right;
        }
        .chart-container { position: relative; height: 450px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 style="text-align:center; margin-bottom:40px;">생산 관리 EOQ 및 총원가 시뮬레이터</h1>

    <div class="dashboard">
        <div class="metrics">
            <div class="metric-box">
                <div class="metric-title">최적 로트 생산량 (EOQ)</div>
                <div class="metric-value" id="val-eoq">0</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">연간 총 원가 (TC)</div>
                <div class="metric-value" id="val-tc" style="color:#28a745;">0</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">연간 주문/준비 횟수</div>
                <div class="metric-value" id="val-orders">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>연간 수요량 (D)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-D" min="100" max="10000" step="10" value="1440">
                    <input type="number" id="input-D" value="1440">
                </div>
            </div>
            <div class="control-group">
                <label>단위 생산 원가 (c)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-c" min="1" max="5000" step="1" value="100">
                    <input type="number" id="input-c" value="100">
                </div>
            </div>
            <div class="control-group">
                <label>작업준비 고정 비용 (A)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-A" min="10" max="2000" step="10" value="140">
                    <input type="number" id="input-A" value="140">
                </div>
            </div>
            <div class="control-group">
                <label>단위당 재고 유지비용 (h)</label>
                <div class="input-wrapper">
                    <input type="range" id="slider-h" min="1" max="500" step="1" value="28">
                    <input type="number" id="input-h" value="28">
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="costChart"></canvas>
        </div>
    </div>

    <script>
        let costChart;

        function initChart() {
            const ctx = document.getElementById('costChart').getContext('2d');
            costChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: '총 변동 비용 (Setup + Holding)',
                            data: [],
                            borderColor: '#1d1d1f',
                            borderWidth: 3,
                            fill: false,
                            pointRadius: 0,
                            tension: 0.4
                        },
                        {
                            label: '재고 유지 비용 (Holding)',
                            data: [],
                            borderColor: '#34c759',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        },
                        {
                            label: '작업준비 비용 (Setup)',
                            data: [],
                            borderColor: '#ff3b30',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        },
                        {
                            label: '최적점 (EOQ)',
                            data: [],
                            backgroundColor: '#0066cc',
                            borderColor: '#0066cc',
                            pointRadius: 9,
                            pointHoverRadius: 11,
                            showLine: false,
                            type: 'scatter'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 400 },
                    plugins: {
                        legend: {
                            labels: {
                                usePointStyle: true,
                                pointStyle: 'circle',
                                padding: 20
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => `${context.dataset.label}: ${Math.round(context.parsed.y).toLocaleString()}원`
                            }
                        }
                    },
                    scales: {
                        x: { type: 'linear', title: { display: true, text: '로트 생산량 (Q)' }, min: 0 },
                        y: { title: { display: true, text: '비용 (Cost)' }, min: 0 }
                    }
                }
            });
        }

        function update() {
            const D = parseFloat(document.getElementById('input-D').value) || 0;
            const c = parseFloat(document.getElementById('input-c').value) || 0;
            const A = parseFloat(document.getElementById('input-A').value) || 0;
            const h = parseFloat(document.getElementById('input-h').value) || 0;

            if (h === 0 || D === 0) return;

            const eoq = Math.sqrt((2 * D * A) / h);
            const purchaseCost = D * c;
            const variableCost = (D / eoq) * A + (eoq / 2) * h;
            const totalCost = purchaseCost + variableCost;

            document.getElementById('val-eoq').innerText = Math.round(eoq).toLocaleString() + " 개";
            document.getElementById('val-tc').innerText = Math.round(totalCost).toLocaleString() + " 원";
            document.getElementById('val-orders').innerText = (D / eoq).toFixed(1) + " 회";

            const holdingData = [], setupData = [], totalVarData = [];
            const maxQ = Math.max(1000, Math.ceil(eoq * 2.5));
            costChart.options.scales.x.max = maxQ;

            for (let q = 10; q <= maxQ; q += Math.max(1, maxQ/100)) {
                const setup = (D / q) * A;
                const holding = (q / 2) * h;
                holdingData.push({x: q, y: holding});
                setupData.push({x: q, y: setup});
                totalVarData.push({x: q, y: setup + holding});
            }

            costChart.data.datasets[0].data = totalVarData;
            costChart.data.datasets[1].data = holdingData;
            costChart.data.datasets[2].data = setupData;
            costChart.data.datasets[3].data = [{x: eoq, y: variableCost}];
            costChart.update();
        }

        function bind(id) {
            const s = document.getElementById('slider-' + id);
            const i = document.getElementById('input-' + id);
            s.oninput = () => { i.value = s.value; update(); };
            i.oninput = () => { s.value = i.value; update(); };
        }

        initChart();
        ['D', 'c', 'A', 'h'].forEach(bind);
        update();
    </script>
</body>
</html>
