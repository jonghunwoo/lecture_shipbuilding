<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOST 일반 이동(General Move) 시간 산출기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .sequence-box { background: #e8f4f8; padding: 15px; border-radius: 6px; text-align: center; font-size: 20px; letter-spacing: 2px; margin-bottom: 30px; font-weight: bold; color: #2980b9; }
        .form-group { display: flex; align-items: center; margin-bottom: 15px; }
        .form-group label { flex: 1; font-weight: 600; color: #34495e; }
        .form-group select { flex: 2; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 15px; }
        .result-card { background: #2c3e50; color: #fff; padding: 25px; border-radius: 8px; margin-top: 30px; text-align: center; }
        .result-card h2 { margin: 0 0 15px 0; font-size: 22px; font-weight: 400; color: #ecf0f1; }
        .result-value { font-size: 36px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .equation { font-size: 18px; color: #bdc3c7; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>MOST 일반 이동 (General Move) 시뮬레이터</h1>
    
    <div class="sequence-box">
        기본 시퀀스: A B G &nbsp;&nbsp; A B P &nbsp;&nbsp; A
    </div>

    <div class="form-group">
        <label>A (대상물로 이동):</label>
        <select id="a1" onchange="calculate()">
            <option value="0">0 - 손 뻗는 거리 내</option>
            <option value="1">1 - 1~2걸음 이내</option>
            <option value="3">3 - 3~4걸음</option>
            <option value="6">6 - 5~7걸음</option>
        </select>
    </div>

    <div class="form-group">
        <label>B (신체 동작):</label>
        <select id="b1" onchange="calculate()">
            <option value="0">0 - 동작 없음</option>
            <option value="3">3 - 구부렸다 일어남</option>
            <option value="6">6 - 무거운 것을 들고 일어남 (힘듦)</option>
        </select>
    </div>

    <div class="form-group">
        <label>G (쥐기):</label>
        <select id="g" onchange="calculate()">
            <option value="1">1 - 가벼운 물체 단순 쥐기</option>
            <option value="3">3 - 무겁거나 방해물 있는 곳에서 쥐기</option>
        </select>
    </div>

    <hr style="border: 0; border-top: 1px dashed #bdc3c7; margin: 25px 0;">

    <div class="form-group">
        <label>A (작업 위치로 이동):</label>
        <select id="a2" onchange="calculate()">
            <option value="0">0 - 손 뻗는 거리 내</option>
            <option value="1">1 - 1~2걸음 이내</option>
            <option value="3">3 - 3~4걸음</option>
            <option value="6">6 - 5~7걸음</option>
        </select>
    </div>

    <div class="form-group">
        <label>B (작업 시 신체 동작):</label>
        <select id="b2" onchange="calculate()">
            <option value="0">0 - 동작 없음</option>
            <option value="3">3 - 구부렸다 일어남</option>
            <option value="6">6 - 무거운 것을 들고 일어남 (힘듦)</option>
        </select>
    </div>

    <div class="form-group">
        <label>P (놓기):</label>
        <select id="p" onchange="calculate()">
            <option value="0">0 - 대충 던져 놓기</option>
            <option value="1">1 - 일반적인 위치에 올려놓기</option>
            <option value="3">3 - 정확한 위치에 끼워 맞추기 (주의력 요함)</option>
        </select>
    </div>

    <hr style="border: 0; border-top: 1px dashed #bdc3c7; margin: 25px 0;">

    <div class="form-group">
        <label>A (원위치 복귀):</label>
        <select id="a3" onchange="calculate()">
            <option value="0">0 - 이동 없음 / 손만 복귀</option>
            <option value="1">1 - 1~2걸음 이내 복귀</option>
            <option value="3">3 - 3~4걸음 복귀</option>
            <option value="6">6 - 5~7걸음 복귀</option>
        </select>
    </div>

    <div class="result-card">
        <h2>최종 산출 결과</h2>
        <div class="equation" id="equationDisplay">A0 + B0 + G1 + A0 + B0 + P0 + A0 = 지수합 1</div>
        <div style="font-size: 16px; color: #ecf0f1;">산출된 TMU: <span id="tmuDisplay" style="font-weight: bold;">10</span> TMU</div>
        <div class="result-value" id="secDisplay">0.36 초</div>
    </div>
</div>

<script>
    function calculate() {
        // Parse values from selects
        const a1 = parseInt(document.getElementById('a1').value);
        const b1 = parseInt(document.getElementById('b1').value);
        const g  = parseInt(document.getElementById('g').value);
        const a2 = parseInt(document.getElementById('a2').value);
        const b2 = parseInt(document.getElementById('b2').value);
        const p  = parseInt(document.getElementById('p').value);
        const a3 = parseInt(document.getElementById('a3').value);

        // Logic Calculation
        const totalIndex = a1 + b1 + g + a2 + b2 + p + a3;
        const totalTMU = totalIndex * 10;
        const totalSeconds = (totalTMU * 0.036).toFixed(2);

        // Update UI Strings
        const equationString = `A${a1} + B${b1} + G${g} + A${a2} + B${b2} + P${p} + A${a3} = 지수합 ${totalIndex}`;
        
        // Render
        document.getElementById('equationDisplay').innerText = equationString;
        document.getElementById('tmuDisplay').innerText = totalTMU;
        document.getElementById('secDisplay').innerText = totalSeconds + " 초";
    }

    // Run once on load to initialize values
    calculate();
</script>

</body>
</html>
